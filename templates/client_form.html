{% extends "base.html" %}
{% block title %}{{ 'Edit' if client else 'New' }} Client{% endblock %}
{% block content %}
<h1>{{ 'Edit client' if client else 'New client' }}</h1>

<form method="POST" class="form-card">
  <label>Client / organization name</label>
  <input type="text" name="name" required value="{{ client.name if client else '' }}">

  <label>Contact name</label>
  <input type="text" name="contact_name" value="{{ client.contact_name if client else '' }}">

  <label>Contact email</label>
  <input type="email" name="contact_email" value="{{ client.contact_email if client else '' }}">

  <label>Contact phone</label>
  <input type="text" name="contact_phone" value="{{ client.contact_phone if client else '' }}">

  <label>Notes</label>
  <textarea name="notes" rows="4">{{ client.notes if client else '' }}</textarea>

  <div class="form-actions">
    <button type="submit" class="btn-primary">{{ 'Save changes' if client else 'Add client' }}</button>
    <a href="{{ url_for('clients') }}" class="btn-link">Cancel</a>
  </div>
</form>
{% endblock %}
