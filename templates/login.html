{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Log in</h1>
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" required autofocus>

    <label>Password</label>
    <input type="password" name="password" required>

    <button type="submit" class="btn-primary">Log in</button>
  </form>
  {% if no_users_yet %}
  <p class="auth-alt">No accounts exist yet. <a href="{{ url_for('register') }}">Create the first (admin) account</a>.</p>
  {% else %}
  <p class="auth-alt">New here? Ask an admin to send you an invite link.</p>
  {% endif %}
</div>
{% endblock %}
